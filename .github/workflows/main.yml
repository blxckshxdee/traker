name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool

      - name: Initialize Buildozer
        run: |
          buildozer init
          # Настройка buildozer.spec для Android
          sed -i 's/title = My Application/title = LifeRPG/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = liferpg/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.liferpg/' buildozer.spec
          sed -i 's/# requirements = python3/requirements = python3, kivy==2.3.0, pillow, plyer/' buildozer.spec
          sed -i 's/# android.permissions = /android.permissions = INTERNET, VIBRATE, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE/' buildozer.spec
          sed -i 's/# android.api = 27/android.api = 33/' buildozer.spec
          sed -i 's/# android.minapi = 21/android.minapi = 21/' buildozer.spec
          sed -i 's/# android.ndk = 25b/android.ndk = 25b/' buildozer.spec

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeRPG-Debug-APK
          path: bin/*.apk
